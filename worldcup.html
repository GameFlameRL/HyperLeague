<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>World Cup</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:18px;
  background: radial-gradient(circle at top, #0f172a 0%, #020617 55%, #000 100%);
  color:#000;
}

.frame{
  width:100%;
  max-width:960px;
  border-radius:26px;
  padding:16px;
  background: linear-gradient(180deg, #334155 0%, #0b1220 100%);
  box-shadow:0 24px 55px rgba(0,0,0,0.65);
  border:2px solid rgba(255,255,255,0.05);
}

.card{
  border-radius:22px;
  padding:18px 18px 16px;
  background: linear-gradient(180deg, #2b3a52 0%, #1b2537 100%);
  border:1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
}

.header{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
  margin-bottom:16px;
}

.brand{
  display:flex;
  gap:14px;
  align-items:flex-start;
}

.brand img{
  width:78px;
  height:78px;
  object-fit:contain;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,0.55));
}

h1{
  font-size:1.55rem;
  font-weight:900;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:#000;
  white-space:nowrap;
}

.subtitle{
  margin-top:6px;
  font-size:0.9rem;
  color:#000;
  opacity:0.85;
}

.nav{
  margin-top:10px;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
}

.nav a{
  text-decoration:none;
  padding:4px 9px;
  border-radius:999px;
  font-size:0.72rem;
  font-weight:800;
  letter-spacing:0.03em;
  background:#1e293b;
  color:#cbd5e1;
  border:1px solid rgba(255,255,255,0.15);
  transition:0.15s ease;
}

.nav a:hover{ background:#334155; }
.nav a.active{
  background:#3b82f6;
  color:#0b1220;
  border-color:#60a5fa;
}

.meta{
  text-align:right;
  font-size:0.95rem;
  color:#000;
  opacity:0.85;
  line-height:1.55;
  white-space:nowrap;
}

.groups-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:16px;
}

.tableFrame{
  border-radius:18px;
  overflow:hidden;
  background:#1e2d42;
  border:2px solid rgba(0,0,0,0.55);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.06),
    0 14px 28px rgba(0,0,0,0.45);
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
}

thead th{
  background:#2a3a52;
  color:#000;
  text-transform:uppercase;
  letter-spacing:0.14em;
  font-size:0.75rem;
  font-weight:900;
  padding:12px 10px;
  border-bottom:1px solid rgba(0,0,0,0.6);
}

th, td{
  text-align:center;
  color:#000;
  font-size:0.92rem;
  padding:12px 10px;
  border-right:1px solid rgba(0,0,0,0.35);
}

th:last-child, td:last-child{border-right:none;}
tbody td{border-bottom:1px solid rgba(0,0,0,0.25);}
tbody tr:last-child td{border-bottom:none;}

.c-team{text-align:left;font-weight:900;padding-left:14px;cursor:pointer;}
.c-team:hover{text-decoration:underline;}
.c-stat{width:36px;}
.c-pts{width:40px;}

.section-label{
  font-size:0.75rem;
  font-weight:900;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:#94a3b8;
  margin:16px 0 8px;
}

.fixtures-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:16px;
}

.gw-label{
  background:#2a3a52;
  color:#000;
  text-transform:uppercase;
  letter-spacing:0.14em;
  font-size:0.75rem;
  font-weight:900;
  padding:12px 10px;
  border-bottom:1px solid rgba(0,0,0,0.6);
  text-align:center;
}

.c-home{text-align:right;font-weight:700;}
.c-score{width:70px;font-weight:900;}
.c-away{text-align:left;font-weight:700;}

.loading{
  text-align:center;
  padding:24px;
  color:#475569;
  font-size:0.9rem;
}

@media(max-width:640px){
  .groups-grid{ grid-template-columns:1fr; }
  .fixtures-grid{ grid-template-columns:1fr; }
  .header{ flex-direction:column; align-items:flex-start; gap:12px; }
  .meta{ text-align:left; white-space:normal; width:100%; }
  h1{ font-size:1.2rem; }
}

.bk-bracket{
  display:flex;
  align-items:stretch;
  gap:0;
  min-width:700px;
  padding:16px 0;
}
.bk-round{
  display:flex;
  flex-direction:column;
  flex:1;
  min-width:150px;
}
.bk-round-label{
  text-align:center;
  font-size:0.72rem;
  font-weight:900;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:#94a3b8;
  padding:0 8px 12px;
}
.bk-matches{
  display:flex;
  flex-direction:column;
  flex:1;
  justify-content:space-around;
  padding:0 8px;
  gap:8px;
}
.bk-match{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.bk-team{
  background:#2a3a52;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;
  padding:7px 10px;
  font-size:0.8rem;
  font-weight:700;
  color:#000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-height:32px;
}
.bk-team.winner{
  background:#1a3a1e;
  border-color:#4ade80;
  color:#4ade80;
}
.bk-team.empty{
  color:#475569;
  font-weight:400;
  font-style:italic;
}
.bk-score{
  font-size:0.85rem;
  font-weight:900;
  color:#fff;
  margin-left:8px;
  flex-shrink:0;
}
.bk-connector{
  display:flex;
  flex-direction:column;
  flex:0 0 24px;
  justify-content:space-around;
}
.bk-connector-pair{
  display:flex;
  flex-direction:column;
  flex:1;
  position:relative;
}
.bk-connector-pair::before{
  content:'';
  position:absolute;
  right:0;
  top:25%;
  height:50%;
  width:50%;
  border-top:2px solid #334155;
  border-right:2px solid #334155;
  border-bottom:2px solid #334155;
}
.bk-connector-pair::after{
  content:'';
  position:absolute;
  left:50%;
  top:50%;
  transform:translateY(-50%);
  width:50%;
  border-top:2px solid #334155;
}

</style>
</head>

<body>
<main class="frame">
<section class="card">

<div class="header">
  <div class="brand">
    <img src="logo.png" alt="Hyper League Logo">
    <div>
      <h1>World Cup</h1>
      <div class="subtitle">Live standings will be updated ASAP by GeeUnit</div>
      <div class="nav">
        <a href="index.html">Overdrive</a>
        <a href="catalyst.html">Catalyst</a>
        <a href="polytechnic.html">Polytechnic</a>
        <a class="active" href="worldcup.html">World Cup</a>
      </div>
    </div>
  </div>
  <div class="meta">
    Last updated: <strong id="last-updated">—</strong>
  </div>
</div>

<!-- Groups -->
<div class="section-label">Group Stage</div>
<div class="groups-grid">
  <div class="tableFrame">
    <table>
      <thead><tr>
        <th class="c-team">GROUP A</th>
        <th class="c-stat">P</th>
        <th class="c-stat">W</th>
        <th class="c-stat">L</th>
        <th class="c-stat">GF</th>
        <th class="c-stat">GA</th>
        <th class="c-stat">GD</th>
        <th class="c-pts">PTS</th>
      </tr></thead>
      <tbody id="group-a"></tbody>
    </table>
  </div>
  <div class="tableFrame">
    <table>
      <thead><tr>
        <th class="c-team">GROUP B</th>
        <th class="c-stat">P</th>
        <th class="c-stat">W</th>
        <th class="c-stat">L</th>
        <th class="c-stat">GF</th>
        <th class="c-stat">GA</th>
        <th class="c-stat">GD</th>
        <th class="c-pts">PTS</th>
      </tr></thead>
      <tbody id="group-b"></tbody>
    </table>
  </div>
  <div class="tableFrame">
    <table>
      <thead><tr>
        <th class="c-team">GROUP C</th>
        <th class="c-stat">P</th>
        <th class="c-stat">W</th>
        <th class="c-stat">L</th>
        <th class="c-stat">GF</th>
        <th class="c-stat">GA</th>
        <th class="c-stat">GD</th>
        <th class="c-pts">PTS</th>
      </tr></thead>
      <tbody id="group-c"></tbody>
    </table>
  </div>
  <div class="tableFrame">
    <table>
      <thead><tr>
        <th class="c-team">GROUP D</th>
        <th class="c-stat">P</th>
        <th class="c-stat">W</th>
        <th class="c-stat">L</th>
        <th class="c-stat">GF</th>
        <th class="c-stat">GA</th>
        <th class="c-stat">GD</th>
        <th class="c-pts">PTS</th>
      </tr></thead>
      <tbody id="group-d"></tbody>
    </table>
  </div>
</div>

<div class="section-label" style="margin-top:16px;">Knockouts</div>
<div class="tableFrame" style="overflow-x:auto;padding:24px 16px;">
  <div class="bk-bracket">
    <div class="bk-round">
      <div class="bk-round-label">Round of 16</div>
      <div class="bk-matches" id="bk-r16-matches"></div>
    </div>
    <div class="bk-connector" id="bk-conn-r16"></div>
    <div class="bk-round">
      <div class="bk-round-label">Quarter Finals</div>
      <div class="bk-matches" id="bk-qf-matches"></div>
    </div>
    <div class="bk-connector" id="bk-conn-qf"></div>
    <div class="bk-round">
      <div class="bk-round-label">Semi Finals</div>
      <div class="bk-matches" id="bk-sf-matches"></div>
    </div>
    <div class="bk-connector" id="bk-conn-sf"></div>
    <div class="bk-round">
      <div class="bk-round-label">Grand Final</div>
      <div class="bk-matches" id="bk-f-matches"></div>
    </div>
  </div>
</div>

</section>
</main>

<script>
const SHEET_ID = "1ilDa0ZleooN3OBruvtOqF9Ym1CitowFjaLCk1GiYiNc";
const GROUPS_GID   = "1035273448";
const FIXTURES_GID = "1681527887";
const PLAYERS_GID  = "1229444923";

const RANK_COLOURS = {
  "Bronze":"#a06b15","Silver":"#a5acb4","Gold":"#f0a009",
  "Platinum":"#1ac7f0","Diamond":"#0556b9","C1":"#9810e7",
  "C2":"#7e09dd","C3":"#5905a1","GC1":"#bb2222",
  "GC2":"#dd1a1a","GC3":"#ff0000","SSL":"#ff00a6"
};

const FLAG_CODES = {
  "england":"gb-eng","greece":"gr","portugal":"pt","sweden":"se",
  "wales":"gb-wls","poland":"pl","spain":"es","albania":"al",
  "morocco":"ma","scotland":"gb-sct","brazil":"br","germany":"de",
  "france":"fr","ireland":"ie","saudi":"sa","saudi arabia":"sa",
  "netherlands":"nl","usa":"us","italy":"it","argentina":"ar",
  "japan":"jp","australia":"au","mexico":"mx","nigeria":"ng",
  "senegal":"sn","denmark":"dk","croatia":"hr","belgium":"be",
  "switzerland":"ch","uruguay":"uy","colombia":"co","peru":"pe",
  "ecuador":"ec","ghana":"gh","cameroon":"cm","south korea":"kr",
  "iran":"ir","qatar":"qa","canada":"ca","tunisia":"tn",
  "costa rica":"cr","serbia":"rs","turkey":"tr","ukraine":"ua",
  "austria":"at","czech republic":"cz","hungary":"hu","romania":"ro",
  "slovakia":"sk","norway":"no","finland":"fi","russia":"ru",
};

function getFlagStyle(team){
  const code = FLAG_CODES[team.toLowerCase()];
  if(!code) return "";
  return `background-image:url('https://flagcdn.com/w80/${code}.png');background-size:cover;background-position:center;background-repeat:no-repeat;position:relative;`;
}

function flagOverlay(){
  return `<span style="position:relative;z-index:1;background:rgba(0,0,0,0.45);padding:3px 8px;border-radius:4px;color:#fff;font-weight:900;">`; 
}

function parseCsv(txt){
  return txt.trim().replace(/\r/g,"").split("\n").map(row=>{
    const cells=[];let inQ=false,cell="";
    for(const ch of row+","){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){cells.push(cell.trim());cell="";}
      else{cell+=ch;}
    }
    return cells;
  });
}

function getCell(grid,row1,col1){
  const r=grid[row1-1];
  if(!r)return"";
  return(r[col1-1]||"").trim();
}

function renderGroup(grid, startRow, startCol, tbodyId){
  const tbody=document.getElementById(tbodyId);
  const rows=[];
  for(let i=0;i<4;i++){
    const team=getCell(grid,startRow+i,startCol);
    if(!team)continue;
    const p  =getCell(grid,startRow+i,startCol+1)||"0";
    const w  =getCell(grid,startRow+i,startCol+2)||"0";
    const l  =getCell(grid,startRow+i,startCol+3)||"0";
    const gf =getCell(grid,startRow+i,startCol+4)||"0";
    const ga =getCell(grid,startRow+i,startCol+5)||"0";
    const gd =getCell(grid,startRow+i,startCol+6)||"0";
    const pts=getCell(grid,startRow+i,startCol+7)||"0";
    const colour=getCell(grid,startRow+i,startCol+8)||"";
    rows.push({team,p,w,l,gf,ga,gd,pts,colour});
  }
  tbody.innerHTML=rows.map(r=>{
    const bg=r.colour?`background-color:${r.colour};`:"";
    const flagStyle=getFlagStyle(r.team);
    return `<tr>
      <td class="c-team" style="${flagStyle}" onclick="openTeam('${encodeURIComponent(r.team)}')">${flagOverlay()}${r.team}</span></td>
      <td class="c-stat" style="${bg}">${r.p}</td>
      <td class="c-stat" style="${bg}">${r.w}</td>
      <td class="c-stat" style="${bg}">${r.l}</td>
      <td class="c-stat" style="${bg}">${r.gf}</td>
      <td class="c-stat" style="${bg}">${r.ga}</td>
      <td class="c-stat" style="${bg}">${r.gd}</td>
      <td class="c-pts" style="${bg}"><strong>${r.pts}</strong></td>
    </tr>`;
  }).join("");
}

function renderGW(grid, gwRow, gwCol, tbodyId){
  const tbody=document.getElementById(tbodyId);
  const rows=[];
  for(let i=1;i<=8;i++){
    const home=getCell(grid,gwRow+i,gwCol);
    const hs=getCell(grid,gwRow+i,gwCol+1);
    const as=getCell(grid,gwRow+i,gwCol+2);
    const away=getCell(grid,gwRow+i,gwCol+3);
    if(!home&&!away)continue;
    const played=hs!==""&&as!==""&&hs.toLowerCase()!=="x"||hs==="x";
    const hsD=hs.toLowerCase()==="x"?"0":hs;
    const asD=as.toLowerCase()==="x"?"0":as;
    const score=(hs!==""&&as!=="")? `${hsD} – ${asD}`:"vs";
    rows.push({home,away,score});
  }
  tbody.innerHTML=rows.map(r=>`<tr>
    <td class="c-home">${r.home}</td>
    <td class="c-score">${r.score}</td>
    <td class="c-away">${r.away}</td>
  </tr>`).join("");
}

function openTeam(encodedTeam){
  window.location.href="wcteam.html?team="+encodedTeam;
}

async function load(){
  // Load groups
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GROUPS_GID}&_ts=${Date.now()}`,{cache:"no-store"});
    const txt=await res.text();
    console.log("Groups CSV first 300 chars:", txt.substring(0,300));
    const grid=parseCsv(txt);
    console.log("Grid row 2:", grid[1]);
    renderGroup(grid,2,1,"group-a");
    renderGroup(grid,9,1,"group-b");
    renderGroup(grid,16,1,"group-c");
    renderGroup(grid,23,1,"group-d");
  }catch(e){console.error("Groups error:",e);}

  document.getElementById("last-updated").textContent=new Date().toLocaleString();
}

const KNOCKOUTS_GID = "273933869";

function renderMatch(t1, s1, s2, t2){
  const played = s1 !== "" && s2 !== "";
  const hs = parseInt(s1) || 0;
  const as = parseInt(s2) || 0;
  const t1win = played && hs > as;
  const t2win = played && as > hs;
  const t1cls = !t1 ? "bk-team empty" : t1win ? "bk-team winner" : "bk-team";
  const t2cls = !t2 ? "bk-team empty" : t2win ? "bk-team winner" : "bk-team";
  const t1score = played ? `<span class="bk-score">${s1}</span>` : "";
  const t2score = played ? `<span class="bk-score">${s2}</span>` : "";
  return `<div class="bk-match">
    <div class="${t1cls}">${t1||"TBD"}${t1score}</div>
    <div class="${t2cls}">${t2||"TBD"}${t2score}</div>
  </div>`;
}

async function loadBracket(){
  try{
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${KNOCKOUTS_GID}&_ts=${Date.now()}`,{cache:"no-store"});
    const txt = await res.text();
    const rows = parseCsv(txt).slice(1).filter(r => r[0]);

    const rounds = {R16:{}, QF:{}, SF:{}, Final:{}};
    for(const r of rows){
      const round = r[0].trim();
      const match = r[1].trim();
      const t1 = (r[2]||"").trim();
      const s1 = (r[3]||"").trim();
      const s2 = (r[4]||"").trim();
      const t2 = (r[5]||"").trim();
      if(rounds[round]) rounds[round][match] = {t1,s1,s2,t2};
    }

    const r16 = document.getElementById("bk-r16-matches");
    const qf  = document.getElementById("bk-qf-matches");
    const sf  = document.getElementById("bk-sf-matches");
    const fin = document.getElementById("bk-f-matches");

    [1,2,3,4].forEach(i => {
      const m = rounds.R16[i] || {};
      r16.innerHTML += renderMatch(m.t1||"",m.s1||"",m.s2||"",m.t2||"");
    });

    // R16 connectors - 2 pairs (each pair covers 2 matches)
    const connR16 = document.getElementById("bk-conn-r16");
    for(let i=0;i<2;i++) connR16.innerHTML += '<div class="bk-connector-pair"></div>';

    [1,2,3,4].forEach(i => {
      const m = rounds.QF[i] || {};
      qf.innerHTML += renderMatch(m.t1||"",m.s1||"",m.s2||"",m.t2||"");
    });

    // QF connectors - 2 pairs (each pair covers 2 matches)
    const connQF = document.getElementById("bk-conn-qf");
    for(let i=0;i<2;i++) connQF.innerHTML += '<div class="bk-connector-pair"></div>';

    [1,2].forEach(i => {
      const m = rounds.SF[i] || {};
      sf.innerHTML += renderMatch(m.t1||"",m.s1||"",m.s2||"",m.t2||"");
    });

    // SF connectors - 1 pair
    const connSF = document.getElementById("bk-conn-sf");
    connSF.innerHTML += '<div class="bk-connector-pair"></div>';

    const finm = rounds.Final[1] || {};
    fin.innerHTML += renderMatch(finm.t1||"",finm.s1||"",finm.s2||"",finm.t2||"");

  }catch(e){ console.error("Bracket error:",e); }
}

load();
loadBracket();
</script>

</body>
</html>
