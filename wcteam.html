<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WC Team</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:18px;
  background: radial-gradient(circle at top, #0f172a 0%, #020617 55%, #000 100%);
  color:#000;
}

.frame{
  width:100%;
  max-width:760px;
  border-radius:26px;
  padding:16px;
  background: linear-gradient(180deg, #334155 0%, #0b1220 100%);
  box-shadow:0 24px 55px rgba(0,0,0,0.65);
  border:2px solid rgba(255,255,255,0.05);
}

.card{
  border-radius:22px;
  padding:18px 18px 16px;
  background: linear-gradient(180deg, #2b3a52 0%, #1b2537 100%);
  border:1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
}

.header{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
  margin-bottom:16px;
}

.brand{
  display:flex;
  gap:14px;
  align-items:flex-start;
}

.brand img{
  width:78px;
  height:78px;
  object-fit:contain;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,0.55));
}

h1{
  font-size:1.55rem;
  font-weight:900;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:#000;
}

.subtitle{
  margin-top:6px;
  font-size:0.9rem;
  color:#000;
  opacity:0.85;
}

.nav{
  margin-top:10px;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
}

.nav a{
  text-decoration:none;
  padding:4px 9px;
  border-radius:999px;
  font-size:0.72rem;
  font-weight:800;
  letter-spacing:0.03em;
  background:#1e293b;
  color:#cbd5e1;
  border:1px solid rgba(255,255,255,0.15);
  transition:0.15s ease;
}

.nav a:hover{ background:#334155; }

.meta{
  text-align:right;
  font-size:0.95rem;
  color:#000;
  opacity:0.85;
  line-height:1.55;
  white-space:nowrap;
}

.tableFrame{
  border-radius:18px;
  overflow:hidden;
  background:#1e2d42;
  border:2px solid rgba(0,0,0,0.55);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.06),
    0 14px 28px rgba(0,0,0,0.45);
  margin-top:16px;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
}

thead th{
  background:#2a3a52;
  color:#000;
  text-transform:uppercase;
  letter-spacing:0.14em;
  font-size:0.75rem;
  font-weight:900;
  padding:12px 10px;
  border-bottom:1px solid rgba(0,0,0,0.6);
}

th, td{
  text-align:center;
  color:#000;
  font-size:0.92rem;
  padding:12px 10px;
  border-right:1px solid rgba(0,0,0,0.35);
}

th:last-child, td:last-child{border-right:none;}
tbody td{border-bottom:1px solid rgba(0,0,0,0.25);}
tbody tr:last-child td{border-bottom:none;}

.c-gw{width:60px;}
.c-home{text-align:center;font-weight:700;}
.c-score{width:80px;font-weight:900;}
.c-away{text-align:center;font-weight:700;}
.result-w{color:#4ade80;}
.result-l{color:#f87171;}
.result-d{color:#000;}
.result-tbd{color:#000;}

.loading{
  text-align:center;
  padding:32px;
  color:#475569;
  font-size:0.9rem;
}
</style>
</head>

<body>
<main class="frame">
<section class="card">

<div class="header">
  <div class="brand">
    <img src="logo.png" alt="Hyper League Logo">
    <div>
      <h1 id="team-title">—</h1>
      <div class="subtitle">World Cup · Fixtures & Results</div>
      <div class="nav">
        <a href="index.html">Overdrive</a>
        <a href="catalyst.html">Catalyst</a>
        <a href="polytechnic.html">Polytechnic</a>
        <a href="worldcup.html">World Cup</a>
      </div>
    </div>
  </div>
  <div class="meta">
    <a href="worldcup.html" style="color:#3b82f6;text-decoration:none;font-weight:700;">← Back</a>
  </div>
</div>

<!-- Fixtures -->
<div class="tableFrame">
  <table>
    <thead>
      <tr>
        <th class="c-gw">GW</th>
        <th colspan="2">OPPONENT</th>
        <th class="c-score">SCORE</th>
        <th style="width:70px;white-space:nowrap;">RESULT</th>
      </tr>
    </thead>
    <tbody id="fixtures-body">
      <tr><td colspan="5" class="loading">Loading fixtures…</td></tr>
    </tbody>
  </table>
</div>

<!-- Players -->
<div class="tableFrame">
  <table>
    <thead>
      <tr>
        <th style="text-align:center;width:67%;">PLAYERS</th>
        <th style="text-align:center;width:33%;white-space:nowrap;">PEAK RANK</th>
      </tr>
    </thead>
    <tbody id="players-body">
      <tr><td colspan="2" class="loading">Loading players…</td></tr>
    </tbody>
  </table>
</div>

</section>
</main>

<script>
const SHEET_ID     = "1ilDa0ZleooN3OBruvtOqF9Ym1CitowFjaLCk1GiYiNc";
const FIXTURES_GID = "1681527887";
const PLAYERS_GID  = "1229444923";

const RANK_COLOURS = {
  "Bronze":"#a06b15","Silver":"#a5acb4","Gold":"#f0a009",
  "Platinum":"#1ac7f0","Diamond":"#0556b9","C1":"#9810e7",
  "C2":"#7e09dd","C3":"#5905a1","GC1":"#bb2222",
  "GC2":"#dd1a1a","GC3":"#ff0000","SSL":"#ff00a6"
};

const GW_START_ROW = 14;
const GW_ROW_STEP  = 7;
const GW_START_COL = 2;
const GW_COL_STEP  = 5;
const GW_COLS      = 3;
const FIXTURE_ROWS = 8;

function parseCsv(txt){
  return txt.trim().replace(/\r/g,"").split("\n").map(row=>{
    const cells=[];let inQ=false,cell="";
    for(const ch of row+","){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){cells.push(cell.trim());cell="";}
      else{cell+=ch;}
    }
    return cells;
  });
}

function getCell(grid,row1,col1){
  const r=grid[row1-1];
  if(!r)return"";
  return(r[col1-1]||"").trim();
}

function parseFixtures(grid, teamName){
  const fixtures=[];
  let gwNum=0;
  for(let rowOff=0;;rowOff+=GW_ROW_STEP){
    const baseRow=GW_START_ROW+rowOff;
    let anyGW=false;
    for(let colOff=0;colOff<GW_COLS*GW_COL_STEP;colOff+=GW_COL_STEP){
      const header=getCell(grid,baseRow,GW_START_COL+colOff);
      if(header.toUpperCase().startsWith("GW")){anyGW=true;break;}
    }
    if(!anyGW)break;
    for(let colOff=0;colOff<GW_COLS*GW_COL_STEP;colOff+=GW_COL_STEP){
      const baseCol=GW_START_COL+colOff;
      const header=getCell(grid,baseRow,baseCol);
      if(!header.toUpperCase().startsWith("GW"))continue;
      gwNum++;
      for(let f=1;f<=FIXTURE_ROWS;f++){
        const r=baseRow+f;
        const home=getCell(grid,r,baseCol);
        const hs=getCell(grid,r,baseCol+1);
        const as=getCell(grid,r,baseCol+2);
        const away=getCell(grid,r,baseCol+3);
        if(!home&&!away)continue;
        const involves=home.toLowerCase()===teamName.toLowerCase()
                    ||away.toLowerCase()===teamName.toLowerCase();
        if(!involves)continue;
        const played=hs!==""&&as!=="";
        const hsD=hs.toLowerCase()==="x"?"0":hs;
        const asD=as.toLowerCase()==="x"?"0":as;
        let result="TBD";
        if(played){
          const h=hsD.toLowerCase()==="x"?0:parseInt(hsD);
          const a=asD.toLowerCase()==="x"?0:parseInt(asD);
          const isHome=home.toLowerCase()===teamName.toLowerCase();
          if(h===a)result="D";
          else if((isHome&&h>a)||(!isHome&&a>h))result="W";
          else result="L";
        }
        fixtures.push({gw:gwNum,home,homeScore:hsD,awayScore:asD,away,result,played});
      }
    }
  }
  return fixtures;
}

function renderFixtures(fixtures, teamName){
  const tbody=document.getElementById("fixtures-body");
  if(!fixtures.length){
    tbody.innerHTML=`<tr><td colspan="5" class="loading">No fixtures found.</td></tr>`;
    return;
  }
  tbody.innerHTML=fixtures.map(f=>{
    const isHome=f.home.toLowerCase()===teamName.toLowerCase();
    const opponent=isHome?f.away:f.home;
    const scoreStr=f.played?`${f.homeScore} – ${f.awayScore}`:"vs";
    const resClass=f.result==="W"?"result-w":f.result==="L"?"result-l":f.result==="D"?"result-d":"result-tbd";
    return `<tr>
      <td class="c-gw">${f.gw}</td>
      <td class="c-home" colspan="2">${opponent}</td>
      <td class="c-score">${scoreStr}</td>
      <td class="${resClass}"><strong>${f.result}</strong></td>
    </tr>`;
  }).join("");
}

async function load(){
  const params=new URLSearchParams(window.location.search);
  const team=params.get("team")||"";
  if(!team){
    document.getElementById("team-title").textContent="No team selected";
    return;
  }
  const decoded=decodeURIComponent(team);
  document.getElementById("team-title").textContent=decoded;

  // Fixtures
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${FIXTURES_GID}&_ts=${Date.now()}`,{cache:"no-store"});
    const txt=await res.text();
    const grid=parseCsv(txt);
    const fixtures=parseFixtures(grid,decoded);
    renderFixtures(fixtures,decoded);
  }catch(e){
    console.error("Fixtures error:",e);
    document.getElementById("fixtures-body").innerHTML=
      `<tr><td colspan="5" class="loading">Error loading fixtures.</td></tr>`;
  }

  // Players
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${PLAYERS_GID}&_ts=${Date.now()}`,{cache:"no-store"});
    const txt=await res.text();
    const rows=txt.trim().replace(/\r/g,"").split("\n").slice(1);
    const players=rows.map(r=>{
      const cols=[];let inQ=false,cell="";
      for(const ch of r+","){
        if(ch==='"'){inQ=!inQ;}
        else if(ch===","&&!inQ){cols.push(cell.trim());cell="";}
        else{cell+=ch;}
      }
      return cols;
    }).filter(r=>r[0].toLowerCase()===decoded.toLowerCase())
      .map(r=>({name:r[1]||"",rank:(r[2]||"").trim()}));

    const tbody=document.getElementById("players-body");
    if(players.length){
      tbody.innerHTML=players.map(p=>{
        const rankBg=RANK_COLOURS[p.rank]?"background-color:"+RANK_COLOURS[p.rank]+";":"";
        return `<tr>
          <td style="text-align:center;font-weight:900;">${p.name}</td>
          <td style="text-align:center;font-weight:700;white-space:nowrap;${rankBg}">${p.rank}</td>
        </tr>`;
      }).join("");
    }else{
      tbody.innerHTML=`<tr><td colspan="2" class="loading">No players found.</td></tr>`;
    }
  }catch(e){
    console.error("Players error:",e);
    document.getElementById("players-body").innerHTML=
      `<tr><td colspan="2" class="loading">Error loading players.</td></tr>`;
  }
}

load();
</script>

</body>
</html>
