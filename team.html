<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Team Fixtures</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:18px;
  background: radial-gradient(circle at top, #0f172a 0%, #020617 55%, #000 100%);
  color:#000;
}

.frame{
  width:100%;
  max-width:760px;
  border-radius:26px;
  padding:16px;
  background: linear-gradient(180deg, #334155 0%, #0b1220 100%);
  box-shadow:0 24px 55px rgba(0,0,0,0.65);
  border:2px solid rgba(255,255,255,0.05);
}

.card{
  border-radius:22px;
  padding:18px 18px 16px;
  background: linear-gradient(180deg, #2b3a52 0%, #1b2537 100%);
  border:1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
}

.header{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
  margin-bottom:16px;
}

.brand{
  display:flex;
  gap:14px;
  align-items:flex-start;
}

.brand img{
  width:78px;
  height:78px;
  object-fit:contain;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,0.55));
}

h1{
  font-size:1.55rem;
  font-weight:900;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:#000;
  white-space:nowrap;
}

.subtitle{
  margin-top:6px;
  font-size:0.9rem;
  color:#000;
}

.nav{
  margin-top:10px;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
}

.nav a{
  text-decoration:none;
  padding:4px 9px;
  border-radius:999px;
  font-size:0.72rem;
  font-weight:800;
  letter-spacing:0.03em;
  background:#1e293b;
  color:#cbd5e1;
  border:1px solid rgba(255,255,255,0.15);
  transition:0.15s ease;
}

.nav a:hover{ background:#334155; }

.meta{
  text-align:right;
  font-size:0.95rem;
  color:#000;
  line-height:1.55;
  white-space:nowrap;
}

.tableFrame{
  border-radius:18px;
  overflow:hidden;
  background:#1e2d42;
  border:2px solid rgba(0,0,0,0.55);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.06),
    0 14px 28px rgba(0,0,0,0.45);
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
}

thead th{
  background:#2a3a52;
  color:#000;
  text-transform:uppercase;
  letter-spacing:0.14em;
  font-size:0.75rem;
  font-weight:900;
  padding:12px 10px;
  border-bottom:1px solid rgba(0,0,0,0.6);
}

th, td{
  text-align:center;
  color:#000;
  font-size:0.92rem;
  padding:12px 10px;
  border-right:1px solid rgba(0,0,0,0.35);
}

th:last-child, td:last-child{border-right:none;}
tbody td{border-bottom:1px solid rgba(0,0,0,0.25);}
tbody tr:last-child td{border-bottom:none;}

.c-gw{width:60px; color:#000;}
.c-home{text-align:center; font-weight:700;}
.c-score{width:80px; font-weight:900; color:#000;}
.c-away{text-align:center; font-weight:700;}

.result-w{ color:#4ade80; }
.result-l{ color:#f87171; }
.result-d{ color:#000; }
.result-tbd{ color:#000; }

.loading{
  text-align:center;
  padding:32px;
  color:#000;
  font-size:0.9rem;
}

@media (max-width:640px){
  .header{ flex-direction:column; align-items:flex-start; gap:12px; }
  .meta{ text-align:left; white-space:normal; width:100%; }
  .brand img{ width:60px; height:60px; }
  h1{ white-space:normal; font-size:1.2rem; }
  thead th{ font-size:0.62rem; padding:8px 4px; letter-spacing:0.08em; }
  td{ font-size:0.72rem; padding:8px 4px; }
  .c-gw{ width:36px; }
  .c-score{ width:56px; }
}
</style>
</head>

<body>
<main class="frame">
<section class="card">

<div class="header">
  <div class="brand">
    <img src="logo.png" alt="Hyper League Logo">
    <div>
      <h1 id="team-title">—</h1>
      <div class="subtitle" id="league-subtitle">—</div>
      <div class="nav">
        <a href="index.html">Overdrive</a>
        <a href="catalyst.html">Catalyst</a>
        <a href="polytechnic.html">Polytechnic</a>
      </div>
    </div>
  </div>
  <div class="meta">
    Season: <strong id="season-num">—</strong><br>
    <a href="#" id="back-link" style="color:#3b82f6;text-decoration:none;font-weight:700;">← Back</a>
  </div>
</div>

<div class="tableFrame">
  <table>
    <thead>
      <tr>
        <th class="c-gw">GW</th>
        <th colspan="2">OPPONENT</th>
        <th class="c-score">SCORE</th>
        <th style="width:48px;">RES</th>
      </tr>
    </thead>
    <tbody id="fixtures-body">
      <tr><td colspan="5" class="loading">Loading fixtures…</td></tr>
    </tbody>
  </table>
</div>

<div style="margin-top:16px;">
  <div class="tableFrame">
    <table>
      <thead>
        <tr>
          <th style="text-align:left;padding-left:14px;">PLAYERS</th>
        </tr>
      </thead>
      <tbody id="players-body">
        <tr><td class="loading">Loading players…</td></tr>
      </tbody>
    </table>
  </div>
</div>

</section>
</main>

<script>
const SHEET_ID = "1ilDa0ZleooN3OBruvtOqF9Ym1CitowFjaLCk1GiYiNc";
const SEASON_CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=46702868`;
const PLAYERS_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1229444923`;

const LEAGUE_CONFIG = {
  overdrive:   { gid: "876178219",  standingsGid: "829195735", label: "Overdrive",   back: "index.html" },
  catalyst:    { gid: "1457576231", standingsGid: "934379579", label: "Catalyst",    back: "catalyst.html" },
  polytechnic: { gid: "1607823597", standingsGid: "629194466", label: "Polytechnic", back: "polytechnic.html" }
};

// Sheet layout constants (1-based row/col as in spreadsheet)
// GW headers start at row 14, col 2 (B14), then every 7 rows
// GW blocks are every 5 columns: B, G, L, Q (cols 2,7,12,17)
// Within each block: col0=home, col1=homeScore, col2=awayScore, col3=away
const GW_START_ROW = 14;  // 1-based
const GW_ROW_STEP  = 7;
const GW_START_COL = 2;   // 1-based (B)
const GW_COL_STEP  = 5;
const GW_COLS      = 4;   // 4 blocks per row
const FIXTURE_ROWS = 5;   // fixtures per GW

function csvToGrid(txt) {
  return txt.replace(/\r/g, "").split("\n").map(row => {
    const cells = [];
    let inQ = false, cell = "";
    for (const ch of row + ",") {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === "," && !inQ) { cells.push(cell.trim()); cell = ""; }
      else { cell += ch; }
    }
    return cells;
  });
}

function getCell(grid, row1, col1) {
  // row1 and col1 are 1-based
  const r = grid[row1 - 1];
  if (!r) return "";
  return (r[col1 - 1] || "").trim();
}

function parseFixtures(grid, teamName) {
  const fixtures = [];
  let gwNum = 0;

  // Iterate over GW block rows (row 14, 21, 28 ...)
  for (let rowOff = 0; ; rowOff += GW_ROW_STEP) {
    const baseRow = GW_START_ROW + rowOff;
    // Check if any GW header exists in this row
    let anyGW = false;
    for (let colOff = 0; colOff < GW_COLS * GW_COL_STEP; colOff += GW_COL_STEP) {
      const baseCol = GW_START_COL + colOff;
      const header = getCell(grid, baseRow, baseCol);
      if (header.toUpperCase().startsWith("GW")) { anyGW = true; break; }
    }
    if (!anyGW) break;

    // Iterate over GW blocks in this row
    for (let colOff = 0; colOff < GW_COLS * GW_COL_STEP; colOff += GW_COL_STEP) {
      const baseCol = GW_START_COL + colOff;
      const header = getCell(grid, baseRow, baseCol);
      if (!header.toUpperCase().startsWith("GW")) continue;
      gwNum++;

      for (let f = 1; f <= FIXTURE_ROWS; f++) {
        const r = baseRow + f;
        const home      = getCell(grid, r, baseCol);
        const homeScore = getCell(grid, r, baseCol + 1);
        const awayScore = getCell(grid, r, baseCol + 2);
        const away      = getCell(grid, r, baseCol + 3);

        if (!home && !away) continue;

        const involves = home.toLowerCase() === teamName.toLowerCase()
                      || away.toLowerCase() === teamName.toLowerCase();
        if (!involves) continue;

        const played = homeScore !== "" && awayScore !== "";

        let result = "TBD";
        if (played) {
          const hs = homeScore.toLowerCase() === "x" ? 0 : parseInt(homeScore);
          const as = awayScore.toLowerCase() === "x" ? 0 : parseInt(awayScore);
          const isHome = home.toLowerCase() === teamName.toLowerCase();
          if (hs === as) result = "D";
          else if ((isHome && hs > as) || (!isHome && as > hs)) result = "W";
          else result = "L";
        }

        const displayHome = homeScore.toLowerCase() === "x" ? "0" : homeScore;
        const displayAway = awayScore.toLowerCase() === "x" ? "0" : awayScore;

        fixtures.push({ gw: gwNum, home, homeScore: displayHome, awayScore: displayAway, away, result, played });
      }
    }
  }
  return fixtures;
}

function renderFixtures(fixtures, teamName, colours) {
  const tbody = document.getElementById("fixtures-body");
  if (!fixtures.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="loading">No fixtures found for ${teamName}</td></tr>`;
    return;
  }
  tbody.innerHTML = fixtures.map(f => {
    const scoreStr = f.played
      ? `${f.homeScore} – ${f.awayScore}`
      : "vs";
    const resClass = f.result === "W" ? "result-w"
                   : f.result === "L" ? "result-l"
                   : f.result === "D" ? "result-d"
                   : "result-tbd";
    const isHome = f.home.toLowerCase() === teamName.toLowerCase();
    const opponent = isHome ? f.away : f.home;
    const oppColour = colours[opponent.toLowerCase()] || "";
    const oppBg = oppColour ? "background-color:" + oppColour + ";" : "";
    const venue = isHome ? "H" : "A";
    return `<tr>
      <td class="c-gw">${f.gw}</td>
      <td class="c-home" colspan="2" style="${oppBg}font-weight:700;">${opponent}</td>
      <td class="c-score">${scoreStr}</td>
      <td class="${resClass}"><strong>${f.result}</strong></td>
    </tr>`;
  }).join("");
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const team   = params.get("team") || "";
  const league = (params.get("league") || "overdrive").toLowerCase();
  const config = LEAGUE_CONFIG[league] || LEAGUE_CONFIG.overdrive;

  if (!team) {
    document.getElementById("team-title").textContent = "No team selected";
    document.getElementById("fixtures-body").innerHTML =
      `<tr><td colspan="5" class="loading">Please navigate here from a league standings page.</td></tr>`;
    return;
  }

  document.getElementById("team-title").textContent = team;
  document.getElementById("league-subtitle").textContent = config.label + " · Fixtures & Results";
  document.getElementById("back-link").href = config.back;

  // Load season
  try {
    const sRes = await fetch(SEASON_CSV_URL + "&_ts=" + Date.now(), {cache:"no-store"});
    const sTxt = await sRes.text();
    const season = sTxt.trim().split(/\r?\n/)[0].split(",")[0].replace(/"/g,"").trim();
    if (season) document.getElementById("season-num").textContent = season;
  } catch(e) {
    console.warn("Could not load season:", e);
  }

  // Load fixtures
  try {
    // Fetch standings for team colours
    const colours = {};
    try {
      const cUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${config.standingsGid}&_ts=${Date.now()}`;
      const cRes = await fetch(cUrl, {cache:"no-store"});
      const cTxt = await cRes.text();
      const cRows = cTxt.trim().replace(/\r/g,"").split("\n").slice(1);
      cRows.forEach(row => {
        const cols = row.split(",");
        const name = (cols[1] || "").trim().toLowerCase();
        const colour = (cols[9] || "").trim();
        if (name && colour) colours[name] = colour;
      });
    } catch(e) {
      console.warn("Could not load colours:", e);
    }

    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${config.gid}&_ts=${Date.now()}`;
    const res  = await fetch(url, {cache:"no-store"});
    const text = await res.text();
    const grid = csvToGrid(text);
    const fixtures = parseFixtures(grid, team);
    renderFixtures(fixtures, team, colours);
  } catch(e) {
    console.error("Could not load fixtures:", e);
    document.getElementById("fixtures-body").innerHTML =
      `<tr><td colspan="5" class="loading">Error loading fixtures.</td></tr>`;
  }

  // Load players
  try {
    const pRes = await fetch(PLAYERS_CSV_URL + "&_ts=" + Date.now(), {cache:"no-store"});
    const pTxt = await pRes.text();
    const pRows = pTxt.trim().replace(/\r/g,"").split("\n").slice(1);
    const players = pRows
      .map(r => r.split(","))
      .filter(r => r[0].trim().toLowerCase() === team.toLowerCase())
      .map(r => r[1].trim());
    const pbody = document.getElementById("players-body");
    if (players.length) {
      pbody.innerHTML = players.map(p =>
        `<tr><td style="text-align:left;padding-left:14px;">${p}</td></tr>`
      ).join("");
    } else {
      pbody.innerHTML = `<tr><td class="loading">No players found.</td></tr>`;
    }
  } catch(e) {
    console.error("Could not load players:", e);
    document.getElementById("players-body").innerHTML =
      `<tr><td class="loading">Error loading players.</td></tr>`;
  }
}

load();
</script>

</body>
</html>
